<style>
    .rich-text-widget {
        border: 1px solid #ced4da;
        border-radius: 1rem;
        background: #fff;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
    }

    .rich-text-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        padding: 0.75rem;
        border-bottom: 1px solid #e9ecef;
        background: linear-gradient(180deg, #fbfcfe 0%, #f6f8fb 100%);
    }

    .rich-text-toolbar button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 2.35rem;
        height: 2.35rem;
        border: 1px solid #d0d7e2;
        border-radius: 0.75rem;
        background: #fff;
        color: #0d6efd;
        font-weight: 600;
        line-height: 1;
        transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .rich-text-toolbar button:hover,
    .rich-text-toolbar button:focus {
        background: #0d6efd;
        border-color: #0d6efd;
        color: #fff;
        outline: none;
    }

    .rich-text-toolbar button.is-active {
        background: #0d6efd;
        border-color: #0d6efd;
        color: #fff;
    }

    .rich-text-toolbar-text {
        display: inline-block;
        min-width: 1rem;
        text-align: center;
    }

    .rich-text-editor {
        min-height: {{ min_height|default:"11rem" }};
        padding: 1rem 1rem 1.1rem;
        overflow-y: auto;
        text-align: left;
        line-height: 1.55;
    }

    .rich-text-editor:focus {
        outline: none;
    }

    .rich-text-editor.is-empty::before {
        content: attr(data-placeholder);
        color: #9aa3af;
        pointer-events: none;
    }

    .rich-text-editor p,
    .rich-text-content p {
        margin: 0 0 0.8rem;
    }

    .rich-text-editor p:last-child,
    .rich-text-content p:last-child {
        margin-bottom: 0;
    }

    .rich-text-editor ul,
    .rich-text-editor ol,
    .rich-text-content ul,
    .rich-text-content ol {
        margin: 0 0 0.8rem 1.25rem;
        padding: 0;
    }

    .rich-text-editor blockquote,
    .rich-text-content blockquote {
        margin: 0 0 0.8rem;
        padding: 0.35rem 0 0.35rem 0.9rem;
        border-left: 3px solid #0d6efd;
        color: #495057;
        background: rgba(13, 110, 253, 0.04);
    }

    .rich-text-editor a,
    .rich-text-content a {
        color: #0d6efd;
        text-decoration: underline;
    }

    .rich-text-editor table,
    .rich-text-content table {
        width: 100%;
        margin: 0 0 0.8rem;
        border-collapse: collapse;
        table-layout: fixed;
    }

    .rich-text-editor th,
    .rich-text-editor td,
    .rich-text-content th,
    .rich-text-content td {
        border: 1px solid #d0d7e2;
        padding: 0.55rem 0.7rem;
        vertical-align: top;
        word-break: break-word;
    }

    .rich-text-editor th,
    .rich-text-content th {
        background: #f8fafc;
        font-weight: 700;
    }

    .rich-text-editor [align="center"],
    .rich-text-content [align="center"] {
        text-align: center;
    }

    .rich-text-editor [align="right"],
    .rich-text-content [align="right"] {
        text-align: right;
    }
</style>

<div class="rich-text-widget" data-rich-text-widget>
    <div class="rich-text-toolbar" role="toolbar" aria-label="Форматирование текста">
        <button type="button" data-rich-command="bold" data-state-command="bold" title="Жирный" aria-label="Жирный"><strong class="rich-text-toolbar-text">B</strong></button>
        <button type="button" data-rich-command="italic" data-state-command="italic" title="Курсив" aria-label="Курсив"><em class="rich-text-toolbar-text">I</em></button>
        <button type="button" data-rich-command="underline" data-state-command="underline" title="Подчеркнутый" aria-label="Подчеркнутый"><u class="rich-text-toolbar-text">U</u></button>
        <button type="button" data-rich-command="insertUnorderedList" data-state-command="insertUnorderedList" title="Маркированный список" aria-label="Маркированный список"><span class="rich-text-toolbar-text">•</span></button>
        <button type="button" data-rich-command="insertOrderedList" data-state-command="insertOrderedList" title="Нумерованный список" aria-label="Нумерованный список"><span class="rich-text-toolbar-text">1.</span></button>
        <button type="button" data-rich-command="blockquote" data-state-command="blockquote" title="Цитата" aria-label="Цитата"><span class="rich-text-toolbar-text">❝</span></button>
        <button type="button" data-rich-command="justifyLeft" data-state-command="justifyLeft" title="По левому краю" aria-label="По левому краю"><span class="rich-text-toolbar-text">⇤</span></button>
        <button type="button" data-rich-command="justifyCenter" data-state-command="justifyCenter" title="По центру" aria-label="По центру"><span class="rich-text-toolbar-text">≡</span></button>
        <button type="button" data-rich-command="justifyRight" data-state-command="justifyRight" title="По правому краю" aria-label="По правому краю"><span class="rich-text-toolbar-text">⇥</span></button>
        <button type="button" data-rich-command="insertTable" data-state-command="table" title="Таблица" aria-label="Таблица"><span class="rich-text-toolbar-text">▦</span></button>
        <button type="button" data-rich-command="link" data-state-command="link" title="Ссылка" aria-label="Ссылка"><span class="rich-text-toolbar-text">🔗</span></button>
        <button type="button" data-rich-command="removeFormat" title="Очистить формат" aria-label="Очистить формат"><span class="rich-text-toolbar-text">Tx</span></button>
    </div>
    <div
        class="rich-text-editor is-empty"
        contenteditable="true"
        data-rich-editor
        data-placeholder="{{ placeholder|default:'Введите текст' }}"
    ></div>
    <textarea
        id="{{ textarea_id }}"
        name="{{ textarea_name }}"
        class="d-none"
        {% if textarea_rows %}rows="{{ textarea_rows }}"{% endif %}
        {% if textarea_required %}required{% endif %}
    >{{ textarea_value|default_if_none:'' }}</textarea>
</div>

<script>
    if (!window.HelpdeskRichText) {
        window.HelpdeskRichText = {
            normalizeHtml(html) {
                const normalized = (html || "")
                    .replace(/<div>\s*<br\s*\/?>\s*<\/div>/gi, "<p></p>")
                    .replace(/<\/div>\s*<div([^>]*)>/gi, "</p><p$1>")
                    .replace(/<div([^>]*)>/gi, "<p$1>")
                    .replace(/<\/div>/gi, "</p>")
                    .trim();
                if (!normalized || normalized === "<br>" || normalized === "<p><br></p>") {
                    return "";
                }
                return normalized;
            },
            updateEmptyState(editor) {
                const html = window.HelpdeskRichText.normalizeHtml(editor.innerHTML);
                const text = editor.textContent.replace(/\u00a0/g, " ").trim();
                editor.classList.toggle("is-empty", !html && !text);
            },
            syncEditor(widget) {
                const editor = widget.querySelector("[data-rich-editor]");
                const textarea = widget.querySelector("textarea");
                if (!editor || !textarea) {
                    return;
                }
                textarea.value = window.HelpdeskRichText.normalizeHtml(editor.innerHTML);
                window.HelpdeskRichText.updateEmptyState(editor);
            },
            getSelectionContainer() {
                const selection = window.getSelection();
                if (!selection || selection.rangeCount === 0) {
                    return null;
                }
                const range = selection.getRangeAt(0);
                return range.commonAncestorContainer.nodeType === Node.ELEMENT_NODE
                    ? range.commonAncestorContainer
                    : range.commonAncestorContainer.parentElement;
            },
            isSelectionInsideEditor(editor) {
                const container = window.HelpdeskRichText.getSelectionContainer();
                return !!(container && editor.contains(container));
            },
            findEditableBlock(editor) {
                const container = window.HelpdeskRichText.getSelectionContainer();
                if (!container || !editor.contains(container)) {
                    return null;
                }
                return container.closest?.("p, li, blockquote, td, th") || null;
            },
            getAlignmentState(editor) {
                const block = window.HelpdeskRichText.findEditableBlock(editor);
                if (!block) {
                    return null;
                }
                const explicitAlign = (block.getAttribute("align") || block.style.textAlign || "").toLowerCase();
                if (explicitAlign === "left" || explicitAlign === "center" || explicitAlign === "right") {
                    return explicitAlign;
                }
                return null;
            },
            setAlignment(command) {
                document.execCommand(command, false, null);
                const block = window.HelpdeskRichText.findEditableBlock(document.activeElement);
                if (!block) {
                    return;
                }
                if (command === "justifyLeft") {
                    block.setAttribute("align", "left");
                } else if (command === "justifyCenter") {
                    block.setAttribute("align", "center");
                } else if (command === "justifyRight") {
                    block.setAttribute("align", "right");
                }
            },
            toggleBlockquote(editor) {
                const container = window.HelpdeskRichText.getSelectionContainer();
                if (container && editor.contains(container) && container.closest?.("blockquote")) {
                    document.execCommand("formatBlock", false, "p");
                    return;
                }
                document.execCommand("formatBlock", false, "blockquote");
            },
            insertTable() {
                const rows = Math.max(1, parseInt(window.prompt("Количество строк", "2") || "0", 10) || 0);
                const columns = Math.max(1, parseInt(window.prompt("Количество столбцов", "2") || "0", 10) || 0);
                if (!rows || !columns) {
                    return;
                }

                const bodyRows = [];
                for (let rowIndex = 0; rowIndex < rows; rowIndex += 1) {
                    const cells = [];
                    for (let columnIndex = 0; columnIndex < columns; columnIndex += 1) {
                        const tagName = rowIndex === 0 ? "th" : "td";
                        cells.push(`<${tagName}>&nbsp;</${tagName}>`);
                    }
                    bodyRows.push(`<tr>${cells.join("")}</tr>`);
                }
                document.execCommand("insertHTML", false, `<table><tbody>${bodyRows.join("")}</tbody></table><p></p>`);
            },
            executeCommand(widget, command) {
                const editor = widget.querySelector("[data-rich-editor]");
                if (!editor) {
                    return;
                }
                editor.focus();

                if (command === "blockquote") {
                    window.HelpdeskRichText.toggleBlockquote(editor);
                } else if (command === "link") {
                    const url = window.prompt("Введите ссылку", "https://");
                    if (url) {
                        document.execCommand("createLink", false, url);
                    }
                } else if (command === "insertTable") {
                    window.HelpdeskRichText.insertTable();
                } else if (command === "justifyLeft" || command === "justifyCenter" || command === "justifyRight") {
                    window.HelpdeskRichText.setAlignment(command);
                } else {
                    document.execCommand(command, false, null);
                }

                window.HelpdeskRichText.syncEditor(widget);
                window.HelpdeskRichText.refreshToolbarState(widget);
            },
            handleKeydown(event, widget) {
                if (event.key === "Tab") {
                    event.preventDefault();
                    document.execCommand("insertHTML", false, "&nbsp;&nbsp;&nbsp;&nbsp;");
                    window.HelpdeskRichText.syncEditor(widget);
                    window.HelpdeskRichText.refreshToolbarState(widget);
                    return;
                }
                if (event.key === "Enter") {
                    event.preventDefault();
                    if (event.shiftKey) {
                        document.execCommand("insertLineBreak");
                    } else {
                        document.execCommand("insertParagraph");
                    }
                    window.HelpdeskRichText.syncEditor(widget);
                    window.HelpdeskRichText.refreshToolbarState(widget);
                }
            },
            refreshToolbarState(widget) {
                const editor = widget.querySelector("[data-rich-editor]");
                if (!editor) {
                    return;
                }

                const selectionInside = window.HelpdeskRichText.isSelectionInsideEditor(editor);
                const container = selectionInside ? window.HelpdeskRichText.getSelectionContainer() : null;
                const alignmentState = selectionInside ? window.HelpdeskRichText.getAlignmentState(editor) : null;

                widget.querySelectorAll("[data-state-command]").forEach((button) => {
                    const stateCommand = button.dataset.stateCommand;
                    let isActive = false;

                    if (selectionInside) {
                        if (stateCommand === "blockquote") {
                            isActive = !!container?.closest?.("blockquote");
                        } else if (stateCommand === "link") {
                            isActive = !!container?.closest?.("a");
                        } else if (stateCommand === "table") {
                            isActive = !!container?.closest?.("table");
                        } else if (stateCommand === "justifyLeft") {
                            isActive = alignmentState === "left";
                        } else if (stateCommand === "justifyCenter") {
                            isActive = alignmentState === "center";
                        } else if (stateCommand === "justifyRight") {
                            isActive = alignmentState === "right";
                        } else {
                            try {
                                isActive = document.queryCommandState(stateCommand);
                            } catch (error) {
                                isActive = false;
                            }
                        }
                    }

                    button.classList.toggle("is-active", !!isActive);
                });
            },
            initWidget(widget) {
                if (!widget || widget.dataset.richInitialized === "true") {
                    return;
                }
                const editor = widget.querySelector("[data-rich-editor]");
                const textarea = widget.querySelector("textarea");
                if (!editor || !textarea) {
                    return;
                }

                editor.innerHTML = textarea.value || "";
                window.HelpdeskRichText.updateEmptyState(editor);
                window.HelpdeskRichText.refreshToolbarState(widget);

                widget.querySelectorAll("[data-rich-command]").forEach((button) => {
                    button.addEventListener("click", () => {
                        window.HelpdeskRichText.executeCommand(widget, button.dataset.richCommand);
                    });
                });

                editor.addEventListener("input", () => {
                    window.HelpdeskRichText.syncEditor(widget);
                    window.HelpdeskRichText.refreshToolbarState(widget);
                });
                editor.addEventListener("focus", () => {
                    window.HelpdeskRichText.refreshToolbarState(widget);
                });
                editor.addEventListener("click", () => {
                    window.HelpdeskRichText.refreshToolbarState(widget);
                });
                editor.addEventListener("keyup", () => {
                    window.HelpdeskRichText.refreshToolbarState(widget);
                });
                editor.addEventListener("keydown", (event) => {
                    window.HelpdeskRichText.handleKeydown(event, widget);
                });

                if (textarea.form) {
                    textarea.form.addEventListener("submit", () => {
                        window.HelpdeskRichText.syncEditor(widget);
                    });
                }

                widget.dataset.richInitialized = "true";
            },
            initAll(root) {
                (root || document).querySelectorAll("[data-rich-text-widget]").forEach((widget) => {
                    window.HelpdeskRichText.initWidget(widget);
                });
            },
        };

        document.addEventListener("selectionchange", () => {
            const activeEditor = document.activeElement?.closest?.("[data-rich-text-widget]");
            if (activeEditor) {
                window.HelpdeskRichText.refreshToolbarState(activeEditor);
            }
        });
    }

    window.HelpdeskRichText.initAll(document);
</script>
