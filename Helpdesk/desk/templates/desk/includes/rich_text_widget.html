<style>
    .rich-text-widget {
        border: 1px solid #ced4da;
        border-radius: 1rem;
        background: #fff;
        overflow: hidden;
        box-shadow: 0 10px 24px rgba(15, 23, 42, 0.05);
    }

    .rich-text-toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        padding: 0.75rem;
        border-bottom: 1px solid #e9ecef;
        background: linear-gradient(180deg, #fbfcfe 0%, #f6f8fb 100%);
    }

    .rich-text-toolbar button {
        min-width: 2.35rem;
        height: 2.35rem;
        border: 1px solid #d0d7e2;
        border-radius: 0.75rem;
        background: #fff;
        color: #0d6efd;
        font-weight: 600;
        line-height: 1;
        transition: background-color 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .rich-text-toolbar button:hover,
    .rich-text-toolbar button:focus {
        background: #0d6efd;
        border-color: #0d6efd;
        color: #fff;
        outline: none;
    }

    .rich-text-editor {
        min-height: {{ min_height|default:"11rem" }};
        padding: 1rem 1rem 1.1rem;
        overflow-y: auto;
        text-align: left;
        line-height: 1.55;
    }

    .rich-text-editor:focus {
        outline: none;
    }

    .rich-text-editor.is-empty::before {
        content: attr(data-placeholder);
        color: #9aa3af;
        pointer-events: none;
    }

    .rich-text-editor p,
    .rich-text-content p {
        margin: 0 0 0.8rem;
    }

    .rich-text-editor p:last-child,
    .rich-text-content p:last-child {
        margin-bottom: 0;
    }

    .rich-text-editor ul,
    .rich-text-editor ol,
    .rich-text-content ul,
    .rich-text-content ol {
        margin: 0 0 0.8rem 1.25rem;
        padding: 0;
    }

    .rich-text-editor blockquote,
    .rich-text-content blockquote {
        margin: 0 0 0.8rem;
        padding: 0.35rem 0 0.35rem 0.9rem;
        border-left: 3px solid #0d6efd;
        color: #495057;
        background: rgba(13, 110, 253, 0.04);
    }

    .rich-text-editor a,
    .rich-text-content a {
        color: #0d6efd;
        text-decoration: underline;
    }
</style>

<div class="rich-text-widget" data-rich-text-widget>
    <div class="rich-text-toolbar" role="toolbar" aria-label="Форматирование текста">
        <button type="button" data-rich-command="bold" title="Жирный"><strong>B</strong></button>
        <button type="button" data-rich-command="italic" title="Курсив"><em>I</em></button>
        <button type="button" data-rich-command="underline" title="Подчеркнутый"><u>U</u></button>
        <button type="button" data-rich-command="insertUnorderedList" title="Маркированный список">•</button>
        <button type="button" data-rich-command="insertOrderedList" title="Нумерованный список">1.</button>
        <button type="button" data-rich-command="blockquote" title="Цитата">❝</button>
        <button type="button" data-rich-command="link" title="Ссылка">🔗</button>
        <button type="button" data-rich-command="removeFormat" title="Очистить формат">Tx</button>
    </div>
    <div
        class="rich-text-editor is-empty"
        contenteditable="true"
        data-rich-editor
        data-placeholder="{{ placeholder|default:'Введите текст' }}"
    ></div>
    <textarea
        id="{{ textarea_id }}"
        name="{{ textarea_name }}"
        class="d-none"
        {% if textarea_rows %}rows="{{ textarea_rows }}"{% endif %}
        {% if textarea_required %}required{% endif %}
    >{{ textarea_value|default_if_none:'' }}</textarea>
</div>

<script>
    if (!window.HelpdeskRichText) {
        window.HelpdeskRichText = {
            normalizeHtml(html) {
                const normalized = (html || "")
                    .replace(/<div><br><\/div>/gi, "<p></p>")
                    .replace(/<div><br\s*\/?><\/div>/gi, "<p></p>")
                    .replace(/<\/div>\s*<div[^>]*>/gi, "</p><p>")
                    .replace(/<div[^>]*>/gi, "<p>")
                    .replace(/<\/div>/gi, "</p>")
                    .trim();
                if (!normalized || normalized === "<br>" || normalized === "<div><br></div>" || normalized === "<p><br></p>") {
                    return "";
                }
                return normalized;
            },
            updateEmptyState(editor) {
                const html = window.HelpdeskRichText.normalizeHtml(editor.innerHTML);
                editor.classList.toggle("is-empty", !html.replace(/&nbsp;/g, "").trim());
            },
            syncEditor(widget) {
                const editor = widget.querySelector("[data-rich-editor]");
                const textarea = widget.querySelector("textarea");
                if (!editor || !textarea) {
                    return;
                }
                textarea.value = window.HelpdeskRichText.normalizeHtml(editor.innerHTML);
                window.HelpdeskRichText.updateEmptyState(editor);
            },
            executeCommand(widget, command) {
                const editor = widget.querySelector("[data-rich-editor]");
                if (!editor) {
                    return;
                }
                editor.focus();
                if (command === "blockquote") {
                    document.execCommand("formatBlock", false, "blockquote");
                } else if (command === "link") {
                    const url = window.prompt("Введите ссылку", "https://");
                    if (url) {
                        document.execCommand("createLink", false, url);
                    }
                } else {
                    document.execCommand(command, false, null);
                }
                window.HelpdeskRichText.syncEditor(widget);
            },
            initWidget(widget) {
                if (!widget || widget.dataset.richInitialized === "true") {
                    return;
                }
                const editor = widget.querySelector("[data-rich-editor]");
                const textarea = widget.querySelector("textarea");
                if (!editor || !textarea) {
                    return;
                }

                editor.innerHTML = textarea.value || "";
                window.HelpdeskRichText.updateEmptyState(editor);

                widget.querySelectorAll("[data-rich-command]").forEach((button) => {
                    button.addEventListener("click", () => {
                        window.HelpdeskRichText.executeCommand(widget, button.dataset.richCommand);
                    });
                });

                editor.addEventListener("input", () => window.HelpdeskRichText.syncEditor(widget));
                editor.addEventListener("blur", () => window.HelpdeskRichText.syncEditor(widget));
                const form = widget.closest("form");
                if (form && !form.dataset.richSyncBound) {
                    form.addEventListener("submit", () => {
                        form.querySelectorAll("[data-rich-text-widget]").forEach((node) => {
                            window.HelpdeskRichText.syncEditor(node);
                        });
                    });
                    form.dataset.richSyncBound = "true";
                }

                widget.dataset.richInitialized = "true";
            },
            initAll(root) {
                (root || document).querySelectorAll("[data-rich-text-widget]").forEach((widget) => {
                    window.HelpdeskRichText.initWidget(widget);
                });
            },
        };
    }

    window.HelpdeskRichText.initAll(document);
</script>
