{% extends "layout/basic.html" %}

{% block title %}Добавление заявки{% endblock %}

{% block content %}
<style>
    .file-picker-row {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-bottom: 0.75rem;
    }

    .file-picker-status {
        color: #6c757d;
        font-size: 0.95rem;
    }
</style>

<h2 class="ms-2">Добавление заявки</h2>
<div class="container-fluid">
    <form method="post" enctype="multipart/form-data">
        <div class="mb-3">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="alert alert-light border">
                Максимальный размер одного файла: {{ max_upload_size_mb }} МБ.
            </div>
            <div id="files-container"></div>
            <button type="button" class="btn btn-outline-secondary" onclick="addFileField()">Добавить файл</button>
            <p class="mt-3"><input type="submit" value="Добавить заявку"></p>
        </div>
    </form>
</div>

<script>
    let fileFieldIndex = 0;
    const maxFileSizeBytes = {{ max_upload_size_mb }} * 1024 * 1024;

    function updateFileStatus(fileInput, statusNode) {
        if (!fileInput.files || fileInput.files.length === 0) {
            statusNode.textContent = "Файлы не выбраны";
            return;
        }

        const names = Array.from(fileInput.files).map(file => file.name);
        statusNode.textContent = names.join(", ");
    }

    function validateFileSize(fileInput, statusNode) {
        const file = fileInput.files[0];
        if (!file) {
            return true;
        }

        if (file.size > maxFileSizeBytes) {
            alert(`Файл "${file.name}" превышает допустимый размер {{ max_upload_size_mb }} МБ.`);
            fileInput.value = "";
            statusNode.textContent = "Файлы не выбраны";
            return false;
        }

        return true;
    }

    function addFileField() {
        const currentIndex = fileFieldIndex++;
        const fileInputId = `documents-${currentIndex}`;

        const fileInput = document.createElement("input");
        fileInput.type = "file";
        fileInput.name = "documents";
        fileInput.id = fileInputId;
        fileInput.className = "d-none";
        fileInput.addEventListener("change", function(event) {
            const fileContainer = event.target.parentNode;
            const fileNameInput = fileContainer.querySelector('input[type="text"]');
            const fileStatus = fileContainer.querySelector(".file-picker-status");

            if (!validateFileSize(event.target, fileStatus)) {
                fileNameInput.value = "";
                return;
            }

            if (event.target.files.length > 0) {
                fileNameInput.value = event.target.files[0].name;
            } else {
                fileNameInput.value = "";
            }

            updateFileStatus(event.target, fileStatus);
        });

        const fileTrigger = document.createElement("label");
        fileTrigger.htmlFor = fileInputId;
        fileTrigger.className = "btn btn-outline-primary mb-0";
        fileTrigger.textContent = "Выберите документы";

        const fileStatus = document.createElement("span");
        fileStatus.className = "file-picker-status";
        fileStatus.textContent = "Файлы не выбраны";

        const pickerRow = document.createElement("div");
        pickerRow.className = "file-picker-row";
        pickerRow.appendChild(fileTrigger);
        pickerRow.appendChild(fileStatus);

        const fileNameInput = document.createElement("input");
        fileNameInput.type = "text";
        fileNameInput.name = "document_names";
        fileNameInput.placeholder = "Имя файла";
        fileNameInput.className = "form-control";
        fileNameInput.addEventListener("input", handleFileNameChange);

        const fileContainer = document.createElement("div");
        fileContainer.classList.add("file-container", "mb-3");
        fileContainer.appendChild(pickerRow);
        fileContainer.appendChild(fileNameInput);
        fileContainer.appendChild(fileInput);

        const filesContainer = document.getElementById("files-container");
        filesContainer.appendChild(fileContainer);
    }

    function handleFileNameChange(event) {
        const fileNameInput = event.target;
        const fileContainer = fileNameInput.parentNode;
        const fileInput = fileContainer.querySelector('input[type="file"]');
        const file = fileInput.files[0];

        if (!file) {
            return;
        }

        const newFile = new File([file], fileNameInput.value, { type: file.type });
        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(newFile);
        fileInput.files = dataTransfer.files;

        const fileStatus = fileContainer.querySelector(".file-picker-status");
        updateFileStatus(fileInput, fileStatus);
    }

    window.addEventListener("load", () => {
        addFileField();
    });
</script>
{% endblock %}
